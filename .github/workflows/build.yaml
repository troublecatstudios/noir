name: Build Project

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
      - name: Build Code
        run: |
          cd ./.github/build
          dotnet build ./Noir.csproj
          dotnet build ./NoirEditor.csproj
